[build]
builder = "nixpacks"

[build.nixpacks]
pkgs = ["nodejs_22"]
installCmd = "npm install -g bun && bun install"
# Bypass turbo and build directly to avoid cache issues
buildCmd = "cd packages/web && rm -rf .next && bun run build"

[deploy]
startCommand = "cd packages/web && bun run start"
healthcheckPath = "/"
healthcheckTimeout = 300

[[services]]
name = "web"
