worker_processes 1;
error_log /tmp/codecast-nginx-error.log;
pid /tmp/codecast-nginx.pid;

events {
    worker_connections 1024;
}

http {
    access_log /tmp/codecast-nginx-access.log;

    map $host $backend_port {
        local.codecast.sh      3200;
        local.1.codecast.sh    3201;
        local.2.codecast.sh    3202;
        local.3.codecast.sh    3203;
        local.footage.com      5173;
        local.1.footage.com    5174;
        local.2.footage.com    5175;
        local.3.footage.com    5176;
        local.unionagency.co   3300;
        local.1.unionagency.co 3301;
        local.2.unionagency.co 3302;
        local.3.unionagency.co 3303;
        default                3200;
    }

    server {
        listen 80;
        server_name local.codecast.sh local.1.codecast.sh local.2.codecast.sh local.3.codecast.sh local.footage.com local.1.footage.com local.2.footage.com local.3.footage.com local.unionagency.co local.1.unionagency.co local.2.unionagency.co local.3.unionagency.co;

        location / {
            proxy_pass http://127.0.0.1:$backend_port;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }
    }
}
