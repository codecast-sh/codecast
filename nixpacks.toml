# Force fresh build by disabling caching
# Force Node provider instead of Turbo
providers = []

[phases.setup]
nixPkgs = ["nodejs_22", "bun"]

[phases.install]
cmds = ["bun install"]

[phases.build]
cmds = [
  "echo 'Build timestamp: '$(date)",
  "rm -rf packages/web/.next packages/web/node_modules/.cache",
  "cd packages/web && bun run build"
]

[start]
cmd = "cd packages/web && bun run start"
