# Force fresh build by disabling caching
[phases.setup]
nixPkgs = ["nodejs_22", "bun"]

[phases.install]
cmds = ["bun install"]

[phases.build]
# Bust cache and force fresh build
cmds = [
  "echo 'Build timestamp: '$(date)",
  "cd packages/web && rm -rf .next node_modules/.cache",
  "cd packages/web && bun run build"
]

[start]
cmd = "cd packages/web && bun run start"
