    <style>
      /* Mirrors AppLoader.tsx (monochrome mark + hairline shimmer on sol-bg) so
         the static → React handoff is invisible — change them together. */
      #boot-shell {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        gap: 20px;
        align-items: center;
        justify-content: center;
        background: #FBF5E2;
        color: #657b83;
        opacity: 1;
        transition: opacity 200ms ease-out;
        z-index: 2147483647;
      }
      html.dark #boot-shell { background: #002b36; }
      #boot-shell[data-hidden="true"] { opacity: 0; pointer-events: none; }
      #boot-shell .mark { opacity: 0.45; }
      #boot-shell .bar {
        position: relative;
        width: 120px;
        height: 2px;
        border-radius: 999px;
        overflow: hidden;
      }
      #boot-shell .bar::before {
        content: "";
        position: absolute;
        inset: 0;
        background: currentColor;
        opacity: 0.14;
      }
      #boot-shell .bar::after {
        content: "";
        position: absolute;
        top: 0;
        bottom: 0;
        left: 0;
        width: 36px;
        border-radius: 999px;
        background: currentColor;
        opacity: 0.55;
        animation: boot-loader-slide 1.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }
      @keyframes boot-loader-slide {
        0% { transform: translateX(-40px); }
        100% { transform: translateX(124px); }
      }
      #root:not(:empty) ~ #boot-shell { opacity: 0; pointer-events: none; }
    </style>
