<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <title>codecast</title>
    <meta name="description" content="Sync coding agent conversations to a shared database" />
    <meta property="og:title" content="codecast" />
    <meta property="og:description" content="Sync coding agent conversations to a shared database" />
    <meta property="og:site_name" content="codecast" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://codecast.sh" />
    <meta property="og:image" content="/logo-final.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="codecast" />
    <meta name="twitter:description" content="Sync coding agent conversations to a shared database" />
    <meta name="twitter:image" content="/logo-final.png" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" />
    </noscript>
    <script>
      (function() {
        var theme = localStorage.getItem('codecast-theme') || 'light';
        document.documentElement.classList.add(theme);
      })();
    </script>
    <style>
      #boot-shell {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #fafaf7;
        color: #6b6b66;
        font-family: ui-monospace, "JetBrains Mono", SFMono-Regular, Menlo, monospace;
        font-size: 13px;
        letter-spacing: 0.02em;
        opacity: 1;
        transition: opacity 200ms ease-out;
        z-index: 2147483647;
      }
      html.dark #boot-shell { background: #0e0e10; color: #8a8a86; }
      #boot-shell[data-hidden="true"] { opacity: 0; pointer-events: none; }
      #boot-shell .dot {
        width: 6px; height: 6px; border-radius: 50%;
        background: currentColor; opacity: 0.4;
        animation: boot-pulse 1s infinite ease-in-out;
      }
      #boot-shell .dot:nth-child(2) { animation-delay: 0.15s; }
      #boot-shell .dot:nth-child(3) { animation-delay: 0.3s; }
      #boot-shell .row { display: flex; gap: 6px; align-items: center; }
      @keyframes boot-pulse {
        0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
        40% { transform: scale(1); opacity: 0.9; }
      }
      #root:not(:empty) ~ #boot-shell { opacity: 0; pointer-events: none; }
    </style>
  </head>
  <body class="font-mono">
    <div id="root"></div>
    <div id="boot-shell" aria-hidden="true">
      <div class="row"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
